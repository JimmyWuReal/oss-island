name: Feature request
description: Propose an improvement or agent integration
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: upstream
    attributes:
      label: Upstream documentation
      description: For integrations, link the official hook, event, or automation API.
  - type: textarea
    id: security
    attributes:
      label: Privacy and security considerations
      description: Describe new data access, permissions, process control, or network access.
