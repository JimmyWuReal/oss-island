name: Bug report
description: Report a reproducible problem in Oss Island
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Oss Island more reliable.
  - type: input
    id: version
    attributes:
      label: Oss Island version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: macOS 15.5, MacBook Pro M3
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Tell us exactly what happened.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Remove prompts, code, paths, and other sensitive data from logs or screenshots.
