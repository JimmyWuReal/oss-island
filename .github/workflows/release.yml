name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - name: Core checks
        run: swift run OssIslandCoreChecks
      - name: Build unsigned DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./scripts/create-dmg.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "Oss Island $GITHUB_REF_NAME" \
            dist/*.dmg \
            dist/*.sha256
