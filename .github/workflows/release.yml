name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Core checks
        run: swift run OssIslandCoreChecks
      - name: Build unsigned DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./scripts/create-dmg.sh
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              --clobber \
              dist/*.dmg \
              dist/*.sha256
          else
            gh release create "$GITHUB_REF_NAME" \
              --generate-notes \
              --title "Oss Island $GITHUB_REF_NAME" \
              dist/*.dmg \
              dist/*.sha256
          fi
